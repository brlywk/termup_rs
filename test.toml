[info]
name = "Test Development Setup"
version = "0.0.1"

[setup]
pre = ["check_system_ready", "create_temp_dir"]
main = ["install_casks", "write_test_file"]
post = ["init_rust", "install_node"]

[[action]]
name = "Check system readiness"
id = "check_system_ready"
cmd = "echo"
args = ["System check complete - ready for setup"]

[[action]]
name = "Create temp directory"
id = "create_temp_dir"
cmd = "mkdir"
args = ["-p", "/tmp/setup-test"]

[[action]]
name = "Install Homebrew Casks"
id = "install_casks"
cmd = "echo"
args = ["cask1", "cask2", "cask3", "cask4"]
multi_run = true
requires = ["brew"]

[[action]]
name = "Initialize Rust toolchain"
id = "init_rust"
cmd = "echo"
args = ["rustup-init", "-y"]
requires = ["rustup"]

[[action]]
name = "Install Node via NVM"
id = "install_node"
cmd = "echo"
args = ["nvm install node"]
requires_files = ["~/.nvm/nvm.sh"]

[[action]]
name = "Build bat cache"
id = "build_bat_cache"
cmd = "echo"
args = ["bat cache --build"]
requires = ["bat"]
requires_files = ["~/.config/bat/config"]

[[action]]
name = "Install essential tools"
id = "install_tools"
cmd = "echo"
args = ["git", "neovim", "bat", "rustup"]
multi_run = true

[[action]]
name = "Clone Git repo"
id = "clone_repo"
cmd = "echo"
args = ["Cloning dotfiles to ~/.dotfiles"]

[[action]]
name = "Create Symlinks to..."
id = "setup_symlinks"
cmd = "echo"
args = ["Creating symlinks with stow"]

[[action]]
name = "Build some project"
id = "build_project"
cmd = "echo"
args = ["Building in custom directory"]
working_dir = "/tmp/setup-test"

[[action]]
name = "Compile some tool"
id = "compile_tool"
cmd = "echo"
args = ["Compiling custom tool"]
working_dir = "/tmp/setup-test"

[[action]]
name = "Write test file"
id = "write_test_file"
cmd = "tee"
args = ["test_file.txt"]
requires_dir = "/tmp/setup-test"
working_dir = "/tmp/setup-test"
content = '''
[init]
    defaultBranch = "main"
[user]
    name = "me"
    email = "my_email"
[alias]
    out = !git add . && git commit --amend -a --no-edit && git push --force-with-lease
    pure = pull --rebase
'''

[[workflow]]
id = "setup_some_compiler"
name = "Setup Some Compiler"
description = "Install and configure some compiler toolchain"
requires = ["git", "clangd"]
notes = [
  "Ensure LLVM paths are configured in your shell:",
  "export PATH=\"/usr/local/opt/llvm/bin:$PATH\"",
  "This will clone and build the compiler from source",
]
prompt = "Have you configured LLVM paths and are ready to install the compiler?"
actions = ["build_project", "compile_tool"]

[[workflow]]
id = "configure_dev_env"
name = "Configure Development Environment"
description = "Set up IDE and development tools"
requires = ["neovim"]
notes = [
  "This will configure your development environment",
  "Make sure your config files are in place",
]
prompt = "Ready to configure your development environment?"
actions = ["setup_symlinks"]
